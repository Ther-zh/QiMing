# 导盲系统主配置文件

# 系统配置
system:
  mode: "simulation"  # simulation 或 real
  input_mode: "simulated"  # simulated 或 real
  debug: true
  verbose: false  # 详细终端调试开关，true为详细输出，false为简洁输出
  fps: 5  # 主摄推理帧率
  max_frame_buffer: 2  # 环形缓冲区大小（减小可降低视觉路径排队内存）
  # LLM 推理期间暂停从队列取 ASR 任务，降低与 Ollama 的统一内存争抢（见 core/asr_thread.py）
  pause_asr_during_llm: true
  # 每 N 帧做一次 YOLO+VDA；过大则融合/元数据刷新过慢，过小易与 ASR/LLM 争用内存
  vision_sample_interval: 50

# 摄像头配置
cameras:
  camera1:
    id: 0
    device_id: 0  # 真实设备ID
    name: "front"
    resolution: [640, 480]
    fps: 5
    is_main: true

# 麦克风配置
microphones:
  mic1:
    id: 0
    name: "main"
    sample_rate: 16000
    channels: 1
    buffer_size: 1024

# 模型配置
models:
  yolo:
    type: "real"  # mock 或 real
    model_path: "/home/nvidia/MHSEE/QiMing/perception/yolo/model/yolov8n.pt"
    conf_threshold: 0.15
  vda:
    type: "real"
    model_path: "/home/nvidia/MHSEE/QiMing/perception/vda/Video-Depth-Anything"
    encoder: "vits"
    checkpoint_path: "/home/nvidia/models/root/autodl-tmp/vda_checkpoints/video_depth_anything_vits.pth"
    device: "cuda"
    fp32: false
    input_size: 252
    vda_max_input_side: 320
  asr:
    type: "real"
    # Jetson 统一内存：cpu 基线更低；cuda:0 与 YOLO/VDA 叠加易 OOM
    device: "cpu"
    enable_vad: true
    enable_punctuation: true
    model_path: "/home/nvidia/models/root/autodl-tmp/funasr_models/modelscope_cache/iic/SenseVoiceSmall"
    vad_model_path: "/home/nvidia/models/root/autodl-tmp/funasr_models/modelscope_cache/iic/speech_fsmn_vad_zh-cn-16k-common-pytorch"
    punc_model_path: "/home/nvidia/models/root/autodl-tmp/funasr_models/modelscope_cache/iic/punc_ct-transformer_zh-cn-common-vocab272727-pytorch"
  llm:
    type: "real"
    # 仅日志展示；实际推理走 Ollama 的 model_name / model_name_text
    model_path: "/home/nvidia/models/qwen3.5-4b/Qwen3.5-4B-Q4_K_M.gguf"
    # 实际推理见 model_name（非 model_path 的 GGUF）。全链路实测 0.8b 仍会因 Ollama 要 1.7–2.0GiB 连续内存失败，主选 2B-Q4
    model_name: "qwen3.5:2b-q4_K_M"
    model_name_text: "qwen2.5:0.5b"
    # Qwen3.5：关闭思考须顶层 think（由代码传），勿放 options；默认 false
    ollama_think: false
    # 与 sing_test/module_debug 对齐；长导航 prompt 若空回复可适当增大 num_ctx（注意统一内存 OOM）
    max_reply_chars: 512
    max_generate_tokens: 512
    # 全流程 main.py 下 ASR+视觉与 Ollama 争用统一内存；1024 易在片尾触发 Ollama 2.7GiB 需求失败
    ollama_options:
      num_ctx: 384
      num_predict: 128
    # 空响应/异常时兜底（区分真假请看日志行 [LLM_META] event=fallback_*）
    fallback_phrase: "前方道路安全，可以正常通行"

# 目标跟踪配置
tracking:
  min_hits: 3
  max_age: 10
  iou_threshold: 0.4

# 危险评估配置
risk:
  high_risk_threshold: 80
  medium_risk_threshold: 50
  complexity_threshold: 60
  alert_cooldown: 3  # 同类型告警冷却时间（秒）
  min_consecutive_frames: 2  # 触发告警的连续帧数

# 资源管理配置
resources:
  # 启停时摘要里尝试跑一行 tegrastats（Jetson RAM/GR3D 等）；无命令或失败则打印提示
  show_tegrastats_in_summary: true
  # FunASR/VDA 并行时常瞬时 100% CPU，80 会导致 inference 长期拒绝对象融合
  cpu_threshold: 96
  # Jetson 上 percent 常偏高；过严会 fusion_skipped，过松易 OOM，需与 vision_sample_interval 配合
  memory_threshold: 96
  gpu_memory_threshold: 90

# 执行输出配置
execution:
  tts_type: "mock"  # mock 或 real
  broadcast_queue_size: 10
  save_video_output: true
  save_depth_colormap_video: true

# 模拟配置
simulation:
  video_paths:
    camera1: "video/video.mp4"
  audio_path: "test_audio.wav"
