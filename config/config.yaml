# 导盲系统主配置文件

# 系统配置
system:
  mode: "simulation"  # simulation 或 real
  input_mode: "simulated"  # simulated 或 real
  debug: true
  verbose: false  # 详细终端调试开关，true为详细输出，false为简洁输出
  fps: 5  # 主摄推理帧率
  max_frame_buffer: 3  # 环形缓冲区大小

# 摄像头配置
cameras:
  camera1:
    id: 0
    device_id: 0  # 真实设备ID
    name: "front"
    resolution: [640, 480]
    fps: 5
    is_main: true

# 麦克风配置
microphones:
  mic1:
    id: 0
    name: "main"
    sample_rate: 16000
    channels: 1
    buffer_size: 1024

# 模型配置
models:
  yolo:
    type: "real"  # mock 或 real
    model_path: "/root/MHSEE/perception/yolo/model/yolov8n.pt"
    conf_threshold: 0.15
  vda:
    type: "real"  # mock 或 real
    model_path: "/root/MHSEE/vda/Video-Depth-Anything"
  asr:
    type: "real"  # mock 或 real
    model_path: "/root/autodl-tmp/funasr_models/modelscope_cache/iic/SenseVoiceSmall"
  llm:
    type: "real"  # mock 或 real
    model_path: "/root/autodl-tmp/qwen35/tclf90/Qwen3___5-4B-AWQ"

# 目标跟踪配置
tracking:
  min_hits: 3
  max_age: 10
  iou_threshold: 0.4

# 危险评估配置
risk:
  high_risk_threshold: 80
  medium_risk_threshold: 50
  complexity_threshold: 60
  alert_cooldown: 3  # 同类型告警冷却时间（秒）
  min_consecutive_frames: 2  # 触发告警的连续帧数

# 资源管理配置
resources:
  cpu_threshold: 80
  memory_threshold: 80
  gpu_memory_threshold: 90

# 执行输出配置
execution:
  tts_type: "mock"  # mock 或 real
  broadcast_queue_size: 10

# 模拟配置
simulation:
  video_paths:
    camera1: "video/video.mp4"
  audio_path: "test_audio.wav"
