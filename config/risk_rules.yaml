# 危险分级与评分规则配置

# 目标类别权重
category_weights:
  person: 10
  car: 15
  truck: 20
  bicycle: 8
  motorcycle: 12
  traffic_light: 5
  crosswalk: 3
  obstacle: 8
  construction: 10
  unknown: 5

# 距离系数（距离越近，系数越大）
distance_coefficients:
  0-1: 3.0
  1-2: 2.5
  2-3: 2.0
  3-5: 1.5
  5-10: 1.0
  10-20: 0.5
  20+: 0.1

# 速度系数（速度越快，系数越大）
speed_coefficients:
  0-5: 0.5
  5-10: 1.0
  10-15: 1.5
  15-20: 2.0
  20-30: 2.5
  30+: 3.0

# 危险分级
risk_levels:
  level1:  # 高危
    threshold: 80
    description: "紧急危险，需要立即避让"
    alert_message: "危险！请立即避让！"
  level2:  # 中危
    threshold: 50
    description: "中等危险，需要注意"
    alert_message: "注意！前方有危险！"
  level3:  # 低危
    threshold: 30
    description: "轻微危险，建议注意"
    alert_message: "请注意前方情况"
  level4:  # 安全
    threshold: 0
    description: "安全状态"
    alert_message: "道路安全"

# 场景复杂度评分
complexity_items:
  traffic_light: 50
  crosswalk: 30
  intersection: 40
  construction: 35
